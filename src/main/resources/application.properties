spring.application.name=manager

spring.datasource.url=jdbc:postgresql://localhost:5432/microservices-metrics-db
spring.datasource.username=postgres
spring.datasource.password=123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

logging.level.root=INFO
# Logging para o pacote principal
logging.level.com.example.manager=DEBUG
logging.level.com.example.manager.services=DEBUG

# Logging para arquivo
logging.file.name=logs/metric-manager.log
logging.logback.rollingpolicy.file-name-pattern=logs/metric-manager-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=200MB

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true

